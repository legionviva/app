<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGIÓN VIVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .oro { color: #C5A059; }
        /* Animación de fondo soberano */
        .bg-animado {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }
        .boton-live { background: linear-gradient(90deg, #6A0DAD, #C5A059); border-radius: 20px; padding: 5px 25px; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="bg-animado"></div>

    <div class="h-screen flex flex-col justify-between p-6">
        <div class="flex justify-between items-center">
            <h1 class="oro italic font-black text-2xl">LEGIÓN VIVA</h1>
            <span class="text-xs border border-gray-600 px-2 py-1 rounded">SERVIDOR ACTIVO</span>
        </div>

        <div class="text-left mb-20">
            <h2 class="font-bold text-2xl">@Vruan <span class="text-blue-400 text-sm">✔</span></h2>
            <p class="text-gray-300">Dominio total sobre el entorno y la realidad. 🔱</p>
            <p class="oro text-sm mt-2 font-bold italic">Soberanía Biológica y Vitalidad al 100%</p>
        </div>

        <div class="absolute right-6 bottom-40 flex flex-col gap-8 items-center">
            <div onclick="alert('Poder enviado 🔱')" class="text-center">
                <span class="text-4xl block">🔱</span>
                <small>66.6K</small>
            </div>
            <div onclick="regalo()" class="text-center">
                <span class="text-4xl block oro">💎</span>
                <small class="oro">REGALO</small>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-gray-800 flex justify-around items-center py-6">
        <span class="text-3xl cursor-pointer">🏠</span>
        <div class="boton-live" onclick="alert('SISTEMA LIVE: Iniciando transmisión de alto impacto...')">LIVE</div>
        <span class="text-3xl cursor-pointer" onclick="alert('Perfil de Soberano')">👤</span>
    </nav>

    <script>
        function regalo() {
            let cant = prompt("¿Cuántos Diamantes para la Legión?", "100");
            if(cant) alert("Has enviado " + cant + " Diamantes. Lealtad confirmada.");
        }
    </script>
</body>
</html>
